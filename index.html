<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai's MP3 播放器</title>
    <!-- SEO & Metadata -->
    <meta name="description" content="Kai老師美聲推廣委員會。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Main Header -->
        <header class="app-header">
            <div class="logo-area">
                <!-- Soundwave SVG Icon -->
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3V21M17 7V17M22 10V14M7 5V19M2 9V15" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <h1 id="mainTitle">Kai's 音效播放器</h1>
            </div>
            <p class="subtitle">點擊下方按鈕即可播放音效 (單次播放)</p>
        </header>

        <!-- Main Workspace -->
        <main class="player-main">
            <!-- Dynamic Status Panel -->
            <section class="status-panel" id="statusPanel" aria-labelledby="statusText">
                <div class="status-content">
                    <span class="status-dot" id="statusDot"></span>
                    <span class="status-text" id="statusText">就緒</span>
                </div>
                <div class="current-track-info">
                    <span class="track-name" id="trackName">未播放任何音樂</span>
                    <div class="progress-bar-container" id="progressBarContainer">
                        <div class="progress-bar" id="progressBar" role="progressbar" aria-valuenow="0"
                            aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>
            </section>

            <!-- Combo Selection Queue Panel -->
            <section class="combo-panel" id="comboPanel" aria-labelledby="comboTitle">
                <div class="combo-header">
                    <div class="combo-title-area">
                        <svg class="combo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M19 11H5M19 11C20.1046 11 21 11.8954 21 13V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V13C3 11.8954 3.89543 11 5 11M19 11V5C19 3.89543 18.1046 3 17 3H7C5.89543 3 5 3.89543 5 5V11"
                                stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        <h2 id="comboTitle">Kai語音合體區</h2>
                    </div>
                    <div class="combo-actions">
                        <button class="combo-action-btn play-combo" id="playComboBtn" disabled>
                            <svg class="combo-play-icon" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                            組合播放
                        </button>
                        <button class="combo-action-btn clear-combo" id="clearComboBtn" disabled>清空組合</button>
                    </div>
                </div>
                <div class="combo-dropzone" id="comboDropzone">
                    <div class="combo-placeholder" id="comboPlaceholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28"
                            height="28" stroke-linecap="round">
                            <path d="M12 5v14M5 12h14" />
                        </svg>
                        <p>將下方的音效按鈕拖曳至此處進行組合</p>
                    </div>
                    <div class="combo-list" id="comboList"></div>
                </div>
            </section>

            <!-- Buttons List Container -->
            <section class="buttons-container" id="buttonsContainer" aria-label="音效清單">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>正在載入音效檔案...</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>© 2026 Kai. 版權所有。</p>
        </footer>
    </div>

    <!-- Web Audio Player (Hidden API element) -->
    <audio id="audioPlayer" preload="auto"></audio>

    <script src="app.js"></script>
</body>

</html>
